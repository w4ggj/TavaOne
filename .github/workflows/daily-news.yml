name: Daily Ham Radio News

on:
  schedule:
    # 09:00 UTC = 4:00 AM EST / 5:00 AM EDT. GitHub cron is UTC and does not
    # follow daylight saving, so the local clock time shifts by an hour
    # seasonally. The "Last updated" line on the page always shows the real ET
    # time the job ran, so this is cosmetic only.
    - cron: "0 9 * * *"
  workflow_dispatch: {}   # lets you trigger a run by hand from the Actions tab

permissions:
  contents: write          # needed so the job can commit the updated HTML

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate latest_news.html
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python news_updater.py

      - name: Commit and push if changed
        run: |
          git config user.name  "tavaone-news-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest_news.html news_fragment.html
          if git diff --staged --quiet; then
            echo "No changes today - nothing to commit."
          else
            git commit -m "Daily news update ($(date -u +'%Y-%m-%d'))"
            git push
          fi
